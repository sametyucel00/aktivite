name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  functions-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install functions dependencies
        run: npm --prefix functions install

      - name: Lint functions entrypoint
        run: npm --prefix functions run lint

      - name: Test functions helpers
        run: npm --prefix functions test

  firebase-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.11.0

      - name: Install firebase test dependencies
        run: npm --prefix firebase-tests install

      - name: Syntax-check firebase tests
        run: npm --prefix firebase-tests run test:static

      - name: Run Firestore and Storage emulator tests
        run: npm --prefix firebase-tests test

  analyze-and-test:
    runs-on: ubuntu-latest
    env:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate platform wrappers if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios,web,windows .
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web

      - name: Build Android debug APK
        run: flutter build apk --debug
