name: aktivite
description: A low-pressure real-life social activity app built with Flutter and Firebase.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  cached_network_image: ^3.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.4
  cupertino_icons: ^1.0.8
  firebase_analytics: ^11.3.3
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.1.3
  firebase_remote_config: ^5.1.3
  firebase_storage: ^12.3.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.4
  geolocator: ^13.0.1
  go_router: ^14.2.8
  google_maps_flutter: ^2.9.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  permission_handler: ^11.3.1
  riverpod: ^2.5.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/togio_app_icon.png
  adaptive_icon_background: "#F4EDE2"
  adaptive_icon_foreground: assets/images/togio_app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F4EDE2"
  image: assets/images/togio_splash_logo.png
  android: true
  ios: true
  android_12:
    color: "#F4EDE2"
    image: assets/images/togio_splash_logo.png
